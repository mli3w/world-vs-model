name: Refresh board

# Regenerates the static board from live Polymarket data and deploys it to GitHub Pages.
# Pre-tournament this runs a few times a day (prices drift slowly); during the group stage
# (from ~2026-06-11) tighten the cron — e.g. '0 */2 * * *' — since matchdays move the board a lot.
#
# Live results: the Elo forecast re-forecasts when ledger/wc_results.json is present. The auto-feed
# step below polls ESPN's keyless soccer API for completed matches and folds them in idempotently;
# manual commits via src/feed_result.py still work and are still authoritative if there's a clash.

on:
  schedule:
    - cron: '0 */3 * * *'      # every 3 hours (tighter for matchdays; prices move fast)
  push:
    branches: [main]            # redeploy on every source change
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write     # need write so the auto-feeder can commit new results back to main
  pages: write
  id-token: write

# Serialize deploys: GitHub Pages deployments settle on GitHub's backend after the
# Actions step ends, so cancelling the in-progress *run* doesn't stop its deployment —
# a racing run then 400s with "in progress deployment". Queue instead of cancel so each
# deploy fully completes before the next starts (GitHub's recommended Pages config).
concurrency:
  group: pages
  cancel-in-progress: false

# Build and deploy are split into two jobs (GitHub's canonical Pages layout). This keeps
# re-runs safe: "Re-run failed jobs" re-runs only `deploy`, which consumes the single
# artifact `build` already uploaded. A single combined job would re-run upload-pages-artifact
# on every attempt, leaving two "github-pages" artifacts in the run — and deploy-pages refuses
# to deploy when it finds more than one.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Auto-feed any new match results (ESPN, keyless)
        continue-on-error: true                # an API blip must not block the deploy
        run: python src/auto_feed_results.py

      - name: Snapshot pre-match Polymarket prices for newly-played matches
        continue-on-error: true                # only updates the cache; falls back to Elo if it fails
        run: python src/snapshot_polymarket_prices.py

      - name: Auto-resolve completed rungs (advance / QF / SF / F / win) against results
        # Settles the predictions ledger + the 4 paper books + scorecard.json + bracket_score.json
        # + bma.json. Idempotent: rungs already resolved are skipped. Without this, the credibility
        # strip, the bracket score race, and the BMA weights all stay at their pre-tournament zeros
        # even after the round has fully resolved.
        continue-on-error: true
        run: python src/auto_resolve.py

      - name: Refresh the upcoming-matches model↔market disagreement preview
        continue-on-error: true                # if Polymarket/ESPN blips, panel goes empty (graceful)
        # window=5d during knockouts (round-of-32 spans ~6 days, gaps between rounds widen later);
        # group-stage matchdays were tighter (every 2-3d), so 3d worked then. 5d is the safer floor now.
        run: python src/wc_upcoming.py --window 5 --top 6 --min-gap 0.05

      - name: Commit & push new results (if any)
        continue-on-error: true                # if push races another build, retry next cron
        run: |
          if [ -n "$(git status --porcelain ledger/wc_results.json ledger/wc_match_prices.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ledger/wc_results.json ledger/wc_match_prices.json
            # [skip ci] in the message prevents the new commit from re-triggering this workflow,
            # so we never loop on the auto-feed → push → auto-feed → push cycle.
            git commit -m "auto-feed: new match results + Polymarket pre-match prices [skip ci]"
            git push origin HEAD:${GITHUB_REF##*/}
          fi

      - name: Build the board (live Polymarket data)
        # Repo Variables activate optional features; unset = feature omitted.
        #   WVM_POLL_ENDPOINT — the fan-poll bubble · WVM_CF_BEACON — Cloudflare Web Analytics beacon
        env:
          WVM_POLL_ENDPOINT: ${{ vars.WVM_POLL_ENDPOINT }}
          WVM_CF_BEACON: ${{ vars.WVM_CF_BEACON }}
        run: python src/worldcup_board.py --out outputs/index.html

      - name: Data guard — refuse to deploy an empty board
        run: |
          rows=$(grep -o 'data-team=' outputs/index.html | wc -l)
          echo "board team-row occurrences: $rows"
          if [ "$rows" -lt 48 ]; then
            echo "::error::Board has only $rows team rows (<48) — the data fetch likely failed; not deploying."
            exit 1
          fi
          test -f outputs/methodology.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy-2.outputs.page_url || steps.deploy-3.outputs.page_url }}
    steps:
      # deploy-pages intermittently fails with "Deployment failed, try again later." — a transient
      # GitHub Pages *backend* error unrelated to our build (the same commit has deployed cleanly on
      # other attempts). Retry twice with a short backoff so a blip self-heals instead of red-flagging
      # the whole scheduled run. The final attempt is not continue-on-error: if the backend is genuinely
      # down after three tries, the job should fail loudly.
      - id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Back off before retrying the Pages deployment
        if: steps.deploy.outcome == 'failure'
        run: sleep 30
      - id: deploy-2
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Back off before the final Pages deployment retry
        if: steps.deploy.outcome == 'failure' && steps.deploy-2.outcome == 'failure'
        run: sleep 60
      - id: deploy-3
        if: steps.deploy.outcome == 'failure' && steps.deploy-2.outcome == 'failure'
        uses: actions/deploy-pages@v4
